<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-md navbar-dark bg-primary mb-4">
    <div class="container">
      <a class="navbar-brand" href="#">Patient Portal</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container">

    <!-- My Profile -->
    <div class="card shadow-sm mb-4">
      <div class="card-header bg-primary text-white">
        <h5 class="mb-0">My Profile</h5>
      </div>
      <div class="card-body">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Name</label>
            <p class="form-control-plaintext" id="profile-name">Loading...</p>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">EGN</label>
            <p class="form-control-plaintext" id="profile-egn">Loading...</p>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Insured</label>
            <p class="form-control-plaintext" id="profile-isInsured">Loading...</p>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">General Practitioner</label>
            <p class="form-control-plaintext" id="profile-gpName">Loading...</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Examination History -->
    <div class="card shadow-sm mb-4">
      <div class="card-header bg-primary text-white">
        <h5 class="mb-0">Examination History</h5>
      </div>
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-striped table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>Date</th>
                <th>Doctor</th>
                <th>Diagnosis</th>
                <th>Price</th>
                <th>Paid by NZOK</th>
              </tr>
            </thead>
            <tbody id="history-tbody">
              <tr><td colspan="5" class="text-center">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Change GP -->
    <div class="card shadow-sm">
      <div class="card-header bg-primary text-white">
        <h5 class="mb-0">Change General Practitioner</h5>
      </div>
      <div class="card-body">
        <div class="row align-items-end g-3">
          <div class="col-md-6">
            <label for="gp-select" class="form-label fw-bold">Select Doctor</label>
            <select class="form-select" id="gp-select">
              <option value="">-- Loading doctors... --</option>
            </select>
          </div>
          <div class="col-md-2">
            <button class="btn btn-success w-100" onclick="changeGp()">Change GP</button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/patient.js"></script>
</body>
</html>
