spring.application.name=medical-record

spring.datasource.url=jdbc:mysql://localhost:3306/medical_record?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

spring.liquibase.change-log=classpath:db/changelog/changelog.yaml
